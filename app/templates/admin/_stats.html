<div hx-get="/admin/movies/stats"
     hx-trigger="refresh-stats from:body"
     hx-swap="outerHTML"
     class="flex flex-wrap items-center gap-6 bg-white border border-slate-200 rounded p-3 shadow-sm">
  <div>
    <span class="text-xs uppercase text-slate-500">Films</span>
    <span class="text-2xl font-semibold text-slate-900 ml-2">{{ total_movies }}</span>
  </div>
  <div>
    <span class="text-xs uppercase text-slate-500">Sans IMDb</span>
    <span class="text-2xl font-semibold {{ 'text-amber-600' if missing_count else 'text-emerald-600' }} ml-2">
      {{ missing_count }}
    </span>
  </div>
  {% if total_movies %}
  <div class="text-xs text-slate-500">
    {{ ((total_movies - missing_count) * 100 // total_movies) }}% scrapés
  </div>
  {% endif %}
</div>
