<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PlexHub Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { opacity: 1; }
    [aria-busy="true"] { cursor: progress; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="bg-slate-900 text-slate-100 shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-baseline gap-4">
      <h1 class="text-lg font-semibold">PlexHub — Admin films</h1>
      <span class="text-xs text-slate-400">Édition manuelle des IMDb IDs</span>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
