services:
  backend:
    build: .
    container_name: plexhub-backend
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - XTREAM_BASE_URL=${XTREAM_BASE_URL}
      - XTREAM_PORT=${XTREAM_PORT:-80}
      - XTREAM_USERNAME=${XTREAM_USERNAME}
      - XTREAM_PASSWORD=${XTREAM_PASSWORD}
      - SYNC_INTERVAL_HOURS=6
      - ENRICHMENT_DAILY_LIMIT=50000
      - HEALTH_CHECK_BATCH_SIZE=1000
      - PLEX_LIBRARY_DIR=/app/media
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /mnt/raid0-3to:/app/media
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
