services:
  backend:
    build: .
    container_name: plexhub-backend
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_PORT=${APP_PORT:-8000}
      - TMDB_API_KEY=${TMDB_API_KEY}
      # OMDb (complément TMDB : tie-break enrichissement + validateur d'ids).
      # Vide = feature no-op. Se règle dans le .env hôte (jamais commité).
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - OMDB_DAILY_LIMIT=${OMDB_DAILY_LIMIT:-20000}
      - XTREAM_BASE_URL=${XTREAM_BASE_URL}
      - XTREAM_PORT=${XTREAM_PORT:-80}
      - XTREAM_USERNAME=${XTREAM_USERNAME}
      - XTREAM_PASSWORD=${XTREAM_PASSWORD}
      - SYNC_INTERVAL_HOURS=6
      - ENRICHMENT_DAILY_LIMIT=50000
      - HEALTH_CHECK_BATCH_SIZE=1000
      - STREAM_VALIDATION_ENABLED=${STREAM_VALIDATION_ENABLED:-true}
      - STREAM_VALIDATION_CONCURRENCY=${STREAM_VALIDATION_CONCURRENCY:-20}
      - STREAM_VALIDATION_TIMEOUT=${STREAM_VALIDATION_TIMEOUT:-15}
      - STREAM_BROKEN_THRESHOLD=${STREAM_BROKEN_THRESHOLD:-3}
      - STREAM_VALIDATION_RECHECK_HOURS=${STREAM_VALIDATION_RECHECK_HOURS:-24}
      - STREAM_FILTER_BROKEN=${STREAM_FILTER_BROKEN:-true}
      - PLEX_LIBRARY_DIR=/app/media
      # Téléchargement physique de médias (onglet admin « Télécharger ») :
      # chemin FIXE dans le conteneur (comme PLEX_LIBRARY_DIR). Le dossier
      # hôte correspondant se règle via DOWNLOAD_HOST_PATH (volume ci-dessous).
      - DOWNLOAD_DIR=/app/downloads
      - DOWNLOAD_CONCURRENCY=${DOWNLOAD_CONCURRENCY:-1}
      - DOWNLOAD_MIN_FREE_DISK_MB=${DOWNLOAD_MIN_FREE_DISK_MB:-2048}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ${PLEX_MEDIA_HOST_PATH:-./media}:/app/media
      - ${DOWNLOAD_HOST_PATH:-./downloads}:/app/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_PORT:-8000}/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

